services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    cpus: 0.50

  api:
    build: ./api
    restart: unless-stopped
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.50

  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "print('worker healthy')"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.50

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_URL: ${API_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.50

networks:
  internal:
    driver: bridge