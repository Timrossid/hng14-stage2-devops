name: CI-CD Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint deps
        run: pip install flake8

      - name: Run flake8
        working-directory: api
        run: flake8 .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run eslint
        working-directory: frontend
        run: npm run lint

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps
        working-directory: api
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        working-directory: api
        run: pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build -t localhost:5000/hng-frontend:${GITHUB_SHA} -t localhost:5000/hng-frontend:latest ./frontend
          docker push localhost:5000/hng-frontend:${GITHUB_SHA}
          docker push localhost:5000/hng-frontend:latest

      - name: Build api image
        run: |
          docker build -t localhost:5000/hng-api:${GITHUB_SHA} -t localhost:5000/hng-api:latest ./api
          docker push localhost:5000/hng-api:${GITHUB_SHA}
          docker push localhost:5000/hng-api:latest

      - name: Build worker image
        run: |
          docker build -t localhost:5000/hng-worker:${GITHUB_SHA} -t localhost:5000/hng-worker:latest ./worker
          docker push localhost:5000/hng-worker:${GITHUB_SHA}
          docker push localhost:5000/hng-worker:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images for scan
        run: |
          docker build -t localhost:5000/hng-frontend:${GITHUB_SHA} ./frontend
          docker build -t localhost:5000/hng-api:${GITHUB_SHA} ./api
          docker build -t localhost:5000/hng-worker:${GITHUB_SHA} ./worker

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/hng-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan api image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/hng-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan worker image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/hng-worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-frontend.sarif
            trivy-api.sarif
            trivy-worker.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "API_PORT=8000" >> .env
          echo "FRONTEND_PORT=3000" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          sleep 20

      - name: Test job flow
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | python -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | python -c "import sys, json; print(json.load(sys.stdin).get('status',''))")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done

          echo "Job did not complete"
          exit 1

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulate deployment
        run: echo "Deployment successful 🚀"