name: CI-CD Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint deps
        run: pip install flake8

      - name: Run flake8
        working-directory: api
        run: flake8 .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run eslint
        working-directory: frontend
        run: npm run lint

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps
        working-directory: api
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        working-directory: api
        run: pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build -t localhost:5000/hng-frontend:${GITHUB_SHA} -t localhost:5000/hng-frontend:latest ./frontend
          docker push localhost:5000/hng-frontend:${GITHUB_SHA}
          docker push localhost:5000/hng-frontend:latest

      - name: Build api image
        run: |
          docker build -t localhost:5000/hng-api:${GITHUB_SHA} -t localhost:5000/hng-api:latest ./api
          docker push localhost:5000/hng-api:${GITHUB_SHA}
          docker push localhost:5000/hng-api:latest

      - name: Build worker image
        run: |
          docker build -t localhost:5000/hng-worker:${GITHUB_SHA} -t localhost:5000/hng-worker:latest ./worker
          docker push localhost:5000/hng-worker:${GITHUB_SHA}
          docker push localhost:5000/hng-worker:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local images for scan
        run: |
          docker build -t localhost:5000/hng-frontend:${GITHUB_SHA} ./frontend
          docker build -t localhost:5000/hng-api:${GITHUB_SHA} ./api
          docker build -t localhost:5000/hng-worker:${GITHUB_SHA} ./worker

      - name: Run Trivy scan on frontend
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: localhost:5000/hng-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Run Trivy scan on api
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: localhost:5000/hng-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Run Trivy scan on worker
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: localhost:5000/hng-worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Upload SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: |
            trivy-frontend.sarif
            trivy-api.sarif
            trivy-worker.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat <<EOF > .env
          API_PORT=8000
          FRONTEND_PORT=3000
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          EOF

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:3000 && break
            sleep 2
          done
          for i in {1..30}; do
            curl -fsS http://localhost:8000/health && break
            sleep 2
          done

      - name: Submit job and verify completion
        run: |
          JOB_ID=$(curl -fsS -X POST http://localhost:3000/submit | python -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID"
          for i in {1..30}; do
            STATUS=$(curl -fsS http://localhost:8000/jobs/$JOB_ID | python -c "import sys, json; print(json.load(sys.stdin).get('status',''))")
            echo "Current status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulate rolling update
        run: |
          docker network create deploy_net || true

          docker rm -f old_api || true
          docker run -d --name old_api --network deploy_net \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            hng-api:latest || true

          docker rm -f new_api || true
          docker build -t hng-api:latest ./api
          docker run -d --name new_api --network deploy_net \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            hng-api:latest

          SUCCESS=0
          for i in {1..12}; do
            STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}' new_api)
            echo "New container health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              SUCCESS=1
              break
            fi
            sleep 5
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "Health check failed within 60 seconds; keeping old container running."
            docker rm -f new_api
            exit 1
          fi

          docker rm -f old_api || true
          docker rename new_api old_api